<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Passkey Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 480px;
      margin: 60px auto;
      padding: 0 16px;
      color: #111;
    }
    h1 { font-size: 1.6rem; margin-bottom: 12px; }
    #support-banner {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 600;
      margin-bottom: 28px;
    }
    .banner-ok  { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .banner-err { background: #fef3cd; color: #7c5c00; border: 1px solid #fcd34d; }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }
    h2 { font-size: 1.1rem; margin-bottom: 16px; }
    input {
      display: block;
      width: 100%;
      padding: 9px 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }
    .btn-primary {
      padding: 9px 20px;
      background: #0070f3;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }
    .btn-primary:hover { background: #005ac6; }
    .btn-primary:disabled { background: #aaa; cursor: default; }
    .btn-link {
      background: none;
      border: none;
      color: #0070f3;
      font-size: .85rem;
      cursor: pointer;
      margin-top: 10px;
      display: inline-block;
      text-decoration: underline;
      padding: 0;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 14px 0 2px;
      color: #999;
      font-size: .78rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }
    .pw-section { display: none; }
    .pw-section.visible { display: block; }
    #status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: .95rem;
      display: none;
    }
    .ok  { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .err { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    small { display: block; margin-top: 10px; color: #666; font-size: .82rem; }
  </style>
</head>
<body>
  <h1>Passkey Demo</h1>

  <!-- Populated by initUI() after feature detection -->
  <div id="support-banner"></div>

  <!-- ── Register ── -->
  <div class="card">
    <h2>Register</h2>
    <input id="reg-username" type="text" placeholder="Username" autocomplete="username webauthn" maxlength="64">

    <!-- Passkey path -->
    <div id="reg-pk-section">
      <button class="btn-primary" id="reg-btn" onclick="register()">Register with passkey</button>
      <div class="divider">or</div>
      <button class="btn-link" onclick="showPw('reg')">Use password instead</button>
    </div>

    <!-- Password fallback (hidden until toggled or passkeys unavailable) -->
    <div id="reg-pw-section" class="pw-section">
      <input id="reg-password" type="password" placeholder="Password (min 8 chars)" autocomplete="new-password">
      <button class="btn-primary" id="reg-pw-btn" onclick="registerPassword()">Register with password</button>
      <div class="divider">or</div>
      <button class="btn-link" id="reg-back-btn" onclick="showPk('reg')">Use passkey instead</button>
    </div>

    <small id="reg-hint"></small>
  </div>

  <!-- ── Login ── -->
  <div class="card">
    <h2>Login</h2>

    <!-- Passkey path -->
    <div id="login-pk-section">
      <button class="btn-primary" id="login-btn" onclick="login()">Login with passkey</button>
      <div class="divider">or</div>
      <button class="btn-link" onclick="showPw('login')">Use password instead</button>
    </div>

    <!-- Password fallback -->
    <div id="login-pw-section" class="pw-section">
      <input id="login-username" type="text" placeholder="Username" autocomplete="username">
      <input id="login-password" type="password" placeholder="Password" autocomplete="current-password">
      <button class="btn-primary" id="login-pw-btn" onclick="loginPassword()">Login with password</button>
      <div class="divider">or</div>
      <button class="btn-link" id="login-back-btn" onclick="showPk('login')">Use passkey instead</button>
    </div>

    <small id="login-hint"></small>
  </div>

  <div id="status"></div>

  <script>
    // ── Base64url helpers ────────────────────────────────────────────────────

    function b64uDecode(str) {
      const base64 = str.replace(/-/g, '+').replace(/_/g, '/');
      const padded = base64.padEnd(base64.length + (4 - base64.length % 4) % 4, '=');
      return Uint8Array.from(atob(padded), c => c.charCodeAt(0)).buffer;
    }

    function b64uEncode(buf) {
      const bytes = new Uint8Array(buf);
      let binary = '';
      bytes.forEach(b => (binary += String.fromCharCode(b)));
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    // ── Passkey feature detection ────────────────────────────────────────────
    //
    // Two checks are required:
    //   1. window.PublicKeyCredential — browser implements the WebAuthn API at all.
    //   2. isUserVerifyingPlatformAuthenticatorAvailable() — the *device* has a
    //      built-in authenticator (Touch ID, Face ID, Windows Hello, etc.).
    //      Cross-platform authenticators (USB security keys) pass check 1 but
    //      not necessarily check 2; for a passkey-first UX we care about the
    //      platform version so the user doesn't need to carry a hardware key.

    async function detectPasskeySupport() {
      if (!window.PublicKeyCredential) return false;
      try {
        return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      } catch {
        return false;
      }
    }

    // ── UI initialisation ────────────────────────────────────────────────────

    async function initUI() {
      const supported = await detectPasskeySupport();
      const banner = document.getElementById('support-banner');

      if (supported) {
        banner.textContent = '✓ Passkeys supported on this device';
        banner.className = 'banner-ok';
        document.getElementById('reg-hint').textContent =
          'Uses your device authenticator (Touch ID, Face ID, Windows Hello, …). No password needed.';
        document.getElementById('login-hint').textContent =
          'Usernameless — your device discovers the credential automatically.';
      } else {
        banner.textContent = '⚠ Passkeys not available — password fallback active';
        banner.className = 'banner-err';

        // Hide passkey sections and expose password forms directly.
        document.getElementById('reg-pk-section').style.display  = 'none';
        document.getElementById('login-pk-section').style.display = 'none';
        document.getElementById('reg-pw-section').classList.add('visible');
        document.getElementById('login-pw-section').classList.add('visible');
        // Remove "Use passkey instead" back-links — passkeys simply aren't available.
        document.getElementById('reg-back-btn').style.display   = 'none';
        document.getElementById('login-back-btn').style.display = 'none';

        document.getElementById('reg-hint').textContent =
          'This browser / device does not support passkeys. Register with a password.';
        document.getElementById('login-hint').textContent =
          'This browser / device does not support passkeys. Log in with your password.';
      }
    }

    // Toggle helpers — only reachable on passkey-capable devices.
    function showPw(section) {
      document.getElementById(`${section}-pk-section`).style.display = 'none';
      document.getElementById(`${section}-pw-section`).classList.add('visible');
    }
    function showPk(section) {
      document.getElementById(`${section}-pw-section`).classList.remove('visible');
      document.getElementById(`${section}-pk-section`).style.display = '';
    }

    // ── WebAuthn option preppers ─────────────────────────────────────────────

    function prepareCreationOptions(serverOpts) {
      const pk = serverOpts.publicKey;
      pk.challenge = b64uDecode(pk.challenge);
      pk.user.id   = b64uDecode(pk.user.id);
      if (pk.excludeCredentials?.length) {
        pk.excludeCredentials = pk.excludeCredentials.map(c => ({
          ...c, id: b64uDecode(c.id),
        }));
      }
      return pk;
    }

    function prepareRequestOptions(serverOpts) {
      const pk = serverOpts.publicKey;
      pk.challenge = b64uDecode(pk.challenge);
      if (pk.allowCredentials?.length) {
        pk.allowCredentials = pk.allowCredentials.map(c => ({
          ...c, id: b64uDecode(c.id),
        }));
      }
      return pk;
    }

    // ── Response serialisers ─────────────────────────────────────────────────

    function serializeRegistration(cred) {
      return {
        id:    cred.id,
        rawId: b64uEncode(cred.rawId),
        type:  cred.type,
        response: {
          clientDataJSON:    b64uEncode(cred.response.clientDataJSON),
          attestationObject: b64uEncode(cred.response.attestationObject),
        },
        ...(cred.authenticatorAttachment && {
          authenticatorAttachment: cred.authenticatorAttachment,
        }),
      };
    }

    function serializeAuthentication(cred) {
      return {
        id:    cred.id,
        rawId: b64uEncode(cred.rawId),
        type:  cred.type,
        response: {
          clientDataJSON:    b64uEncode(cred.response.clientDataJSON),
          authenticatorData: b64uEncode(cred.response.authenticatorData),
          signature:         b64uEncode(cred.response.signature),
          ...(cred.response.userHandle && {
            userHandle: b64uEncode(cred.response.userHandle),
          }),
        },
        ...(cred.authenticatorAttachment && {
          authenticatorAttachment: cred.authenticatorAttachment,
        }),
      };
    }

    // ── UI helpers ───────────────────────────────────────────────────────────

    function setStatus(msg, ok) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = ok ? 'ok' : 'err';
      el.style.display = 'block';
    }

    function setLoading(btnId, loading) {
      document.getElementById(btnId).disabled = loading;
    }

    // ── Passkey registration ─────────────────────────────────────────────────

    async function register() {
      const username = document.getElementById('reg-username').value.trim();
      if (!username) { setStatus('Enter a username first.', false); return; }

      setLoading('reg-btn', true);
      try {
        const beginRes = await fetch('/register/begin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username }),
          credentials: 'same-origin',
        });
        const beginData = await beginRes.json();
        if (!beginRes.ok) throw new Error(beginData.error || 'begin failed');
        console.log('[register/begin] server options:', beginData);

        const creationOpts = prepareCreationOptions(beginData);
        console.log('[register/begin] prepared creation options (ArrayBuffers decoded):', creationOpts);

        const cred = await navigator.credentials.create({ publicKey: creationOpts });
        console.log('[register/begin] raw PublicKeyCredential from authenticator:', cred);

        const serialized = serializeRegistration(cred);
        console.log('[register/finish] serialized payload to server:', serialized);

        const finishRes = await fetch('/register/finish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(serialized),
          credentials: 'same-origin',
        });
        const finishData = await finishRes.json();
        console.log('[register/finish] server response:', finishData);
        if (!finishRes.ok) throw new Error(finishData.error || 'finish failed');

        setStatus(`Registered "${finishData.username}" with passkey. You can now log in.`, true);
      } catch (err) {
        setStatus(`Passkey registration failed: ${err.message}`, false);
      } finally {
        setLoading('reg-btn', false);
      }
    }

    // ── Password registration ────────────────────────────────────────────────

    async function registerPassword() {
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      if (!username || !password) { setStatus('Enter username and password.', false); return; }

      setLoading('reg-pw-btn', true);
      try {
        const res = await fetch('/password/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'same-origin',
        });
        const data = await res.json();
        console.log('[password/register] server response:', data);
        if (!res.ok) throw new Error(data.error || 'registration failed');
        setStatus(`Registered "${data.username}" with password. You can now log in.`, true);
      } catch (err) {
        setStatus(`Password registration failed: ${err.message}`, false);
      } finally {
        setLoading('reg-pw-btn', false);
      }
    }

    // ── Passkey login ────────────────────────────────────────────────────────

    async function login() {
      setLoading('login-btn', true);
      try {
        const beginRes = await fetch('/login/begin', {
          method: 'POST',
          credentials: 'same-origin',
        });
        const beginData = await beginRes.json();
        if (!beginRes.ok) throw new Error(beginData.error || 'begin failed');
        console.log('[login/begin] server options:', beginData);

        const requestOpts = prepareRequestOptions(beginData);
        console.log('[login/begin] prepared request options (ArrayBuffers decoded):', requestOpts);

        const cred = await navigator.credentials.get({ publicKey: requestOpts });
        console.log('[login/begin] raw PublicKeyCredential from authenticator:', cred);

        const serialized = serializeAuthentication(cred);
        console.log('[login/finish] serialized payload to server:', serialized);

        const finishRes = await fetch('/login/finish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(serialized),
          credentials: 'same-origin',
        });
        const finishData = await finishRes.json();
        console.log('[login/finish] server response:', finishData);
        if (!finishRes.ok) throw new Error(finishData.error || 'finish failed');

        setStatus(`Logged in as "${finishData.username}". ✓`, true);
      } catch (err) {
        setStatus(`Passkey login failed: ${err.message}`, false);
      } finally {
        setLoading('login-btn', false);
      }
    }

    // ── Password login ───────────────────────────────────────────────────────

    async function loginPassword() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      if (!username || !password) { setStatus('Enter username and password.', false); return; }

      setLoading('login-pw-btn', true);
      try {
        const res = await fetch('/password/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'same-origin',
        });
        const data = await res.json();
        console.log('[password/login] server response:', data);
        if (!res.ok) throw new Error(data.error || 'login failed');
        setStatus(`Logged in as "${data.username}". ✓`, true);
      } catch (err) {
        setStatus(`Password login failed: ${err.message}`, false);
      } finally {
        setLoading('login-pw-btn', false);
      }
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    initUI();
  </script>
</body>
</html>
